app = "ielts-daily"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DB_PATH = "/data/ielts.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "ielts_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
